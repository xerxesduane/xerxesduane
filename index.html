    <!-- Pre-hydration reveal fallback. framer-motion prerenders scroll-reveal
         targets with inline opacity:0 / off-canvas transforms, so until the JS
         bundle hydrates, the page would look blank below the fold. CSS
         animations outrank inline styles, so this force-reveals everything
         after ~2s — but only while <html> lacks .js-ready, which
         entry-client.tsx adds the moment the bundle executes. Fast connections
         never see it; slow or failed JS gets a readable page. -->
    <style>
      @keyframes reveal-fallback {
        to {
          opacity: 1;
          transform: none;
        }
      }
      html:not(.js-ready) [style*="opacity:0"],
      html:not(.js-ready) [style*="opacity: 0"],
      html:not(.js-ready) [style*="115%"] {
        animation: reveal-fallback 0.7s ease 2.2s forwards;
      }
    </style>

    <!-- tw-intro: first-paint curtain for the intro preloader. Keep commented
         while PRELOADER_ENABLED=false in src/lib/config.ts. When enabling the
         preloader, uncomment BOTH blocks so the curtain paints before the JS
         bundle executes (otherwise the page flashes, then gets covered).
    <style>
      #tw-intro{position:fixed;inset:0;z-index:90;background:#07090A}
    </style>
    <script>
      try{if(!sessionStorage.getItem("tw-intro-seen")&&!matchMedia("(prefers-reduced-motion: reduce)").matches){document.write('<div id="tw-intro"></div>')}}catch(e){}
    </script>
    -->
